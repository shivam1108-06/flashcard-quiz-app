<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Quiz App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:linear-gradient(to right,#eef2f3,#dfe9f3);
            min-height:100vh;
        }

        .hero{
            background:linear-gradient(135deg,#0d6efd,#6610f2);
            color:white;
            padding:50px;
            border-radius:20px;
            text-align:center;
            margin-top:40px;
            margin-bottom:30px;
        }

        .card{
            border:none;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

    </style>

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            📚 Flashcard Quiz App
        </a>

    </div>

</nav>

<div class="container">

    <div class="hero">

        <h1>
            📚 Flashcard Quiz App
        </h1>

        <p>
            Create flashcards and improve your learning
        </p>

    </div>

    <div class="card p-4">

        <h3 class="mb-4">
            Create New Flashcard Deck
        </h3>

        <form>

            <div class="mb-3">

                <label class="form-label">
                    Deck Name
                </label>

                <input
                    type="text"
                    class="form-control"
                    placeholder="Enter deck name">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Category
                </label>

                <input
                    type="text"
                    class="form-control"
                    placeholder="Enter category">

            </div>

            <button
                class="btn btn-primary w-100">

                Create Deck

            </button>

        </form>

    </div>

</div>

<footer class="text-center mt-5 mb-3 text-muted">

    <hr>

    <p>
        Created By Shivam Kotak 🚀
    </p>

</footer>

</body>
</html>
