<!DOCTYPE html>
<html>
<head>

    <title>
        Quiz Mode
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f5f7fa;
        }

        .card{
            border:none;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.1);
        }

    </style>

</head>
<body>

<div class="container mt-5">

    <div class="card p-5 text-center">

        <h2 class="mb-4">

            📚 Quiz Mode

        </h2>
        <p class="text-muted">

            Question
            {{ index + 1 }}
            of
            {{ total }}

        </p>
        <h4>

            ❓ Question

        </h4>

        <h3 class="mb-4">

            {{ card.question }}

        </h3>

        <button
            class="btn btn-primary"
            onclick="showAnswer()">

            Show Answer

        </button>

        <div
            id="answer"
            style="display:none;"
            class="mt-4">

            <h4>

                ✅ Answer

            </h4>

            <h3>

                {{ card.answer }}

            </h3>

        </div>

        <div class="mt-4">

    <a
        href="/quiz/{{ index + 1 }}"
        class="btn btn-success">

        Next Question

    </a>

</div>

        <a
            href="/"
            class="btn btn-secondary mt-4">

            Back

        </a>

    </div>

</div>

<script>

function showAnswer(){

    document
        .getElementById(
            "answer"
        )
        .style.display =
            "block";

}

</script>

</body>
</html>
