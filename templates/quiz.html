<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Quiz Mode
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f5f7fa;
            min-height:100vh;
        }

        .card{
            border:none;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.1);
        }

        .quiz-card{
            margin-top:80px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card quiz-card p-5 text-center">

                <h2 class="mb-4">

                    📚 Quiz Mode

                </h2>

                <p class="text-muted">

                    Question
                    {{ index + 1 }}
                    of
                    {{ total }}

                </p>

                <h5 class="text-success mb-4">

                    Score:
                    {{ score }}

                </h5>

                <h4>

                    ❓ Question

                </h4>

                <h3 class="mb-4">

                    {{ card.question }}

                </h3>

                <button
                    class="btn btn-primary"
                    onclick="showAnswer()">

                    Show Answer

                </button>

                <div
                    id="answer"
                    class="mt-4"
                    style="display:none;">

                    <h4>

                        ✅ Answer

                    </h4>

                    <h3>

                        {{ card.answer }}

                    </h3>

                </div>

                <div class="mt-4">

                    {% if index > 0 %}

                    <a
                        href="/quiz/{{ index - 1 }}"
                        class="btn btn-secondary">

                        Previous

                    </a>

                    {% endif %}

                    <a
                        href="/correct"
                        class="btn btn-success">

                        Correct

                    </a>

                    <a
                        href="/quiz/{{ index + 1 }}"
                        class="btn btn-primary">

                        Next

                    </a>

                </div>

                <a
                    href="/"
                    class="btn btn-dark mt-4">

                    Back Home

                </a>

            </div>

        </div>

    </div>

</div>

<script>

function showAnswer(){

    document
        .getElementById(
            "answer"
        )
        .style.display =
            "block";

}

</script>

</body>
</html>
