<!DOCTYPE html>
<html>
<head>

    <title>Edit Flashcard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4">

        <h2 class="mb-4">
            ✏️ Edit Flashcard
        </h2>

        <form method="POST">

            <div class="mb-3">

                <label>
                    Question
                </label>

                <input
                    type="text"
                    name="question"
                    class="form-control"
                    value="{{ card.question }}"
                    required>

            </div>

            <div class="mb-3">

                <label>
                    Answer
                </label>

                <input
                    type="text"
                    name="answer"
                    class="form-control"
                    value="{{ card.answer }}"
                    required>

            </div>

            <button class="btn btn-success">

                Save Changes

            </button>

            <a href="/"
               class="btn btn-secondary">

                Back

            </a>

        </form>

    </div>

</div>

</body>
</html>
